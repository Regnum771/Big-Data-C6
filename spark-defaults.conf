# Spark local mode — không cần cluster
spark.master                            local[2]

# JAR cho Kafka streaming (đường dẫn trong jupyter/pyspark-notebook)
spark.jars                              /usr/local/spark/jars/spark-sql-kafka-0-10_2.12-3.3.2.jar,/usr/local/spark/jars/kafka-clients-3.3.2.jar,/usr/local/spark/jars/spark-token-provider-kafka-0-10_2.12-3.3.2.jar,/usr/local/spark/jars/commons-pool2-2.11.1.jar

spark.driver.memory                     2g
spark.driver.maxResultSize              512m
spark.sql.streaming.checkpointLocation  /data/output/checkpoints
spark.streaming.stopGracefullyOnShutdown true
spark.sql.parquet.compression.codec     snappy
spark.sql.shuffle.partitions            4
spark.ui.enabled                        false
spark.eventLog.enabled                  false