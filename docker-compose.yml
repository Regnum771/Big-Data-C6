version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Bộ bài tập Chương 6 — Ứng dụng Dữ liệu Lớn
# Khởi động: docker compose up -d
# Tắt:       docker compose down
# Xóa data:  docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

networks:
  bigdata-net:
    driver: bridge

volumes:
  data-volume:

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - bigdata-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - bigdata-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # Truy cập từ máy host (notebook dùng localhost:9092)
      - "9093:9093"       # Dùng nội bộ giữa các container
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listener cho hai ngữ cảnh:
      # - PLAINTEXT     → từ máy host (localhost:9092)
      # - PLAINTEXT_INT → từ các container khác (kafka:9093)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INT://kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INT://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - bigdata-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"       # Truy cập tại http://localhost:8081
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      
  # ── Jupyter Notebook ───────────────────────────────────────────────────────
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jupyter
    networks:
      - bigdata-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "bigdata2024"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      DATA_RAW_PATH: /data/raw
      DATA_OUTPUT_PATH: /data/output
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/data
      - ./scripts:/home/jovyan/scripts
